services:
  - type: web
    name: portfolio-intelligence-agent
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: GEMINI_API_KEY
        sync: false # User can set this in the Render dashboard to unlock real Gemini AI analysis
